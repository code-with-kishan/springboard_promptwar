<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <meta name="description" content="Wanderlore context-aware cultural discovery assistant">
    <title>Wanderlore</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="shell">
      <aside class="setup" aria-label="Trip setup">
        <a class="skip-link" href="#results">Skip to results</a>
        <div class="brand" aria-label="Wanderlore">
          <span class="mark" aria-hidden="true">WL</span>
          <div>
            <p>Wanderlore</p>
            <span>Context-aware cultural discovery</span>
          </div>
        </div>

        <form id="setupForm" autocomplete="off">
          <label>City
            <input id="city" name="city" value="New Delhi" required minlength="2" maxlength="80">
          </label>

          <label>Trip length <span id="tripLengthText">4 days</span>
            <input id="tripDaysTotal" name="tripDaysTotal" type="range" min="1" max="7" value="4">
          </label>

          <label>Current day <span id="tripDayText">2</span>
            <input id="tripDay" name="tripDay" type="range" min="1" max="4" value="2">
          </label>

          <fieldset>
            <legend>Interests</legend>
            <div class="chips" id="interests"></div>
          </fieldset>

          <label>Budget
            <select id="budget" name="budget">
              <option value="free">Free</option>
              <option value="$">$</option>
              <option value="$$" selected>$$</option>
              <option value="$$$">$$$</option>
            </select>
          </label>

          <button class="primary" type="submit">Start exploring</button>
        </form>

        <section id="contextPanel" class="context-panel" aria-live="polite"></section>
      </aside>

      <section id="results" class="results" aria-live="polite">
        <nav class="tabs" aria-label="Wanderlore sections">
          <button data-tab="smart" class="active">Smart Picks</button>
          <button data-tab="hidden">Off Path</button>
          <button data-tab="detail">Place Detail</button>
          <button data-tab="events">Happening Now</button>
          <button data-tab="threads">Local Threads</button>
          <button data-tab="passport">Passport</button>
        </nav>
        <div id="view" class="view"></div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
